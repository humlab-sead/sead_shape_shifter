    - entity: taxa
      local_keys: [PCODE]
      remote_keys: [PCODE]
    depends_on: [taxa]
    data_source: arbodat_lookup
    query: "select [PCODE], [Dom], [Dom_u]\nfrom [ÖkoSozDaten];\n"
