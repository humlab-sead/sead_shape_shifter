  _project_contact:
    type: sql
    source:
    public_id: project_contact_id
    keys: [Projekt, contact_type, contact_name]
    columns: [Projekt, ArchAusg, ArchBear, BotBear]
    drop_duplicates: [Projekt, contact_type, contact_name]
    unnest:
      id_vars: [Projekt]
      value_vars: [ArchAusg, ArchBear, BotBear]
      var_name: contact_type
      value_name: contact_name
    data_source: arbodat_data
    query: "select distinct [Projekt], [ArchAusg], [ArchBear], [BotBear] from [Projekte] ;\n"
  relative_ages:
    type: openpyxl
    public_id: relative_age_id
    keys: [archdat]
    columns:
    - relative_age_id
    - relative_age_name
    - description
    - c14_age_older
    - c14_age_younger
    - cal_age_older
    - cal_age_younger
    - abbreviation
    - status
    - archdat
    - archdat_beschreibung
    - epoche
    - epochestatus
    foreign_keys:
    - entity: epoch
      local_keys: [epoche]
      remote_keys: [Epoche]
      how: inner
      constraints:
        cardinality: one_to_one
        require_unique_left: false
        allow_null_keys: false
    drop_duplicates: true
    check_functional_dependency: false
    options:
      filename: relative_ages_arbodat_pilot_subset.xlsx
      location: local
      sheet_name: Sheet1
  abundance_ident_level:
    type: entity
    source: analysis_entity
    public_id: abundance_ident_level_id
    keys: []
    columns: [analysis_entity_id, cf]
    foreign_keys:
    - entity: identification_level
      local_keys: [cf]
      remote_keys: [arbodat_value]
      how: left
      constraints:
        cardinality: many_to_one
        allow_unmatched_right: true
        require_unique_left: false
        require_unique_right: false
        allow_null_keys: false
        allow_row_decrease: true
    drop_duplicates: true
    check_functional_dependency: false
    filters:
    - type: query
      query: cf.notna() and cf != '' and cf != '-'
  modification_type:
    type: fixed
    public_id: modification_type_id
    keys: []
    columns:
    - system_id
    - modification_type_id
    - modification_type_description
    - modification_type_name
    - Nummer
    - Zust
    - Zustand
    values:
    - [1, null, null, not chosen, 9999, '-99', not chosen]
    - [2, null, null, imprint, 60, Ab, imprint]
    - [3, null, null, kiln-dried/partly charred, 55, ag, kiln-dried/partly charred]
    - [4, null, null, calcinated, 56, ca, calcinated]
    - [5, '5', null, mineralised, 30, mi, mineralised]
    - [6, null, null, waterlogged, 20, sf, waterlogged]
    - [7, null, null, others, 999, so, others]
    - [8, null, null, dessicated, 40, st, dessicated]
    - [9, '1', null, charred, 10, vk, charred]
    - [10, null, null, charred and mineralised, 50, vm, charred and mineralised]
  ecocode_system:
    type: fixed
    public_id: ecocode_system_id
    keys: []
    columns:
    - system_id
    - ecocode_system_id
    - biblio_id
    - name
    - notes
    - definition
    values:
    - [1, null, null, ArboDat ecological groups, As extracted from ArboDat 2016, Ecological groups from the Archaeobotanical Database Programme ArboDat]
  ecocode_group:
    type: fixed
    public_id: ecocode_group_id
    keys: []
    columns: [system_id, ecocode_group_id, ecocode_system_id, definition, name]
    values:
    - [1, null, 1, Default group for ArboDat ecological groups, ArboDat group]
    foreign_keys:
    - entity: ecocode_system
      local_keys: [ecocode_system_id]
      remote_keys: [system_id]
      how: inner
      constraints:
        cardinality: many_to_one
        require_unique_left: false
        allow_null_keys: false
  ecocode_definition:
    type: sql
    public_id: ecocode_definition_id
    keys: [Ökogruppe]
    columns: [Ökogruppe, Bezeichnung, Reihenfolge, Eco_EN, Eco_FR]
    foreign_keys:
    - entity: ecocode_group
      local_keys: [ecocode_group_id]
      remote_keys: [system_id]
      how: inner
      constraints:
        cardinality: many_to_one
        require_unique_left: false
        allow_null_keys: false
    extra_columns:
      abbreviation: '"ArboDat {Ökogruppe}"'
      name: Bezeichnung
      notes: '"DE: {Eco_EN}. FR: {Eco_FR}"'
      definition:
      ecocode_group_id: 1
    data_source: arbodat_lookup
    query: SELECT * FROM [T_Ökogruppen]
  ecocode:
    type: entity
    source: taxa_plant_sociological_behaviour
    public_id: ecocode_id
    keys: []
    columns: [Ökogruppe, Ökogruppe_u, PCODE]
    foreign_keys:
    - entity: ecocode_definition
      local_keys: [Ökogruppe]
      remote_keys: [Ökogruppe]
      how: left
      constraints:
        cardinality: many_to_one
        allow_unmatched_right: false
        require_unique_left: false
        require_unique_right: false
        allow_row_decrease: true
        allow_null_keys: true
        allow_unmatched_left: true
    - entity: taxa
      local_keys: [PCODE]
      remote_keys: [PCODE]
      how: inner
      constraints:
        cardinality: one_to_one
        allow_unmatched_right: true
        require_unique_left: false
        require_unique_right: false
        allow_row_decrease: true
        allow_null_keys: false
    extra_columns:
      taxon_id:
options:
  translations:
    filename: translations.tsv
    delimiter: "\t"
  data_sources:
    sead: '@include: ${GLOBAL_DATA_SOURCE_DIR}/sead-options.yml'
    arbodat_data: '@include: ${GLOBAL_DATA_SOURCE_DIR}/arbodat-data-options.yml'
    arbodat_lookup: '@include: ${GLOBAL_DATA_SOURCE_DIR}/arbodat-lookup-options.yml'
  translation: '@load: options.translations'
  reconciliation: '@include: reconciliation.yml'
  finally:
    drop:
      tables: [_pcodes, _project_contact]
      columns:
      - site.public_id
      - project.public_id
      - feature.public_id
      - sample.public_id
      - analysis_entity.public_id
      - abundance.public_id
      - location.public_id
  ingesters:
    sead:
      data_source: sead
      options:
        transfer_format: csv
        ignore_columns: [date_updated, '*_uuid', (*]
      policies:
        if_foreign_key_value_is_missing_add_identity_mapping_to_foreign_key_table:
          priority: 1
        set_public_id_to_negative_system_id_for_new_lookups:
          disabled: true
        update_missing_foreign_key_policy:
          tbl_dataset_contacts:
            contact_type_id: 2
            contact_id: 1
        if_lookup_table_is_missing_add_table_using_system_id_as_public_id:
          tables:
          - tbl_abundance_elements
          - tbl_contact_types
          - tbl_dataset_submission_types
          - tbl_location_types
          - tbl_project_types
          - tbl_project_stages
          - tbl_relative_ages
          - tbl_sample_group_sampling_contexts
          - tbl_sample_types
          preallocated_tables: []
        if_lookup_with_no_new_data_then_keep_only_system_id_public_id:
          priority: 9
        drop_ignored_columns:
          priority: 3
          columns: [date_updated, '*_uuid']
