metadata:
  name: example:sead-canonical-minimal
  type: shapeshifter-project
  description: Hand-authored minimal SEAD-shaped project using canonical target-facing names.
  version: 1.0.0

entities:
  location:
    type: fixed
    public_id: location_id
    keys: []
    columns: [location_name]
    foreign_keys:
      - entity: location_type
        local_keys: [location_type_id]
        remote_keys: [location_type_id]

  location_type:
    type: fixed
    public_id: location_type_id
    keys: []
    columns: [location_type]

  site:
    type: fixed
    public_id: site_id
    keys: []
    columns: [site_name]
    foreign_keys:
      - entity: location
        local_keys: [location_id]
        remote_keys: [location_id]

  sample_group:
    type: entity
    public_id: sample_group_id
    keys: [site_id]
    columns: []
    foreign_keys:
      - entity: site
        local_keys: [site_id]
        remote_keys: [site_id]
      - entity: method
        local_keys: [method_id]
        remote_keys: [method_id]
    extra_columns:
      sample_group_name:
      method_id:

  sample:
    type: entity
    public_id: physical_sample_id
    keys: []
    columns: []
    foreign_keys:
      - entity: sample_group
        local_keys: [sample_group_id]
        remote_keys: [sample_group_id]
      - entity: sample_type
        local_keys: [sample_type_id]
        remote_keys: [sample_type_id]
    extra_columns:
      sample_name:

  sample_type:
    type: fixed
    public_id: sample_type_id
    keys: []
    columns: [type_name]

  method:
    type: fixed
    public_id: method_id
    keys: []
    columns: [method_name, description, method_group_id]

  dataset:
    type: entity
    public_id: dataset_id
    keys: []
    columns: []
    foreign_keys:
      - entity: method
        local_keys: [method_id]
        remote_keys: [method_id]
    extra_columns:
      dataset_name:
      data_type_id:

  analysis_entity:
    type: entity
    public_id: analysis_entity_id
    keys: []
    columns: []
    foreign_keys:
      - entity: sample
        local_keys: [physical_sample_id]
        remote_keys: [physical_sample_id]
      - entity: dataset
        local_keys: [dataset_id]
        remote_keys: [dataset_id]

options: {}