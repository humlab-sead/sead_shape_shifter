<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbfd"/>
      <stop offset="100%" stop-color="#edf3f7"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcecff"/>
      <stop offset="100%" stop-color="#c7def8"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f7ea"/>
      <stop offset="100%" stop-color="#d5eed9"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4df"/>
      <stop offset="100%" stop-color="#f8e5be"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e6f3"/>
      <stop offset="100%" stop-color="#ecd2e7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#34536f"/>
    </marker>
    <style>
      .title { font: 700 48px Arial, sans-serif; fill: #16324b; }
      .subtitle { font: 500 24px Arial, sans-serif; fill: #4b677e; }
      .section { font: 700 28px Arial, sans-serif; fill: #16324b; }
      .label { font: 700 24px Arial, sans-serif; fill: #18344d; }
      .body { font: 500 20px Arial, sans-serif; fill: #29465f; }
      .small { font: 500 18px Arial, sans-serif; fill: #4d677c; }
      .panel { stroke-width: 2; rx: 28; }
      .step { fill: #ffffff; stroke: #b9cad7; stroke-width: 2; rx: 22; }
      .arrow { stroke: #34536f; stroke-width: 7; fill: none; marker-end: url(#arrow); }
      .connector { stroke: #6f879b; stroke-width: 4; fill: none; stroke-dasharray: 10 10; }
      .badge { fill: #16324b; }
      .badgeText { font: 700 18px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="url(#bg)"/>

  <text x="90" y="95" class="title">Shape Shifter Workflow Overview</text>
  <text x="90" y="135" class="subtitle">From source data to validated, reconciled, reusable output</text>

  <rect x="80" y="200" width="360" height="660" class="panel" fill="url(#sourceGrad)" stroke="#84a9d3"/>
  <text x="115" y="255" class="section">1. Source Data</text>
  <rect x="115" y="300" width="290" height="95" class="step"/>
  <text x="145" y="352" class="label">Files</text>
  <text x="145" y="382" class="small">CSV and Excel project assets</text>
  <rect x="115" y="430" width="290" height="95" class="step"/>
  <text x="145" y="482" class="label">Databases</text>
  <text x="145" y="512" class="small">PostgreSQL, SQLite, MS Access</text>
  <rect x="115" y="560" width="290" height="95" class="step"/>
  <text x="145" y="612" class="label">Local Structure</text>
  <text x="145" y="642" class="small">Project-specific names and keys</text>
  <text x="115" y="735" class="body">Input data may be correct in content but inconsistent in shape, identifiers, and relationships.</text>

  <rect x="500" y="200" width="470" height="660" class="panel" fill="url(#engineGrad)" stroke="#88b891"/>
  <text x="535" y="255" class="section">2. Workflow Engine</text>
  <rect x="535" y="300" width="400" height="90" class="step"/>
  <circle cx="575" cy="345" r="22" class="badge"/>
  <text x="569" y="351" class="badgeText">1</text>
  <text x="615" y="350" class="label">Define reusable project configuration</text>
  <text x="615" y="378" class="small">Entities, sources, relationships, transformations</text>
  <rect x="535" y="415" width="400" height="90" class="step"/>
  <circle cx="575" cy="460" r="22" class="badge"/>
  <text x="569" y="466" class="badgeText">2</text>
  <text x="615" y="465" class="label">Model source-to-target workflow</text>
  <text x="615" y="493" class="small">Extract, filter, link, unnest, translate, store</text>
  <rect x="535" y="530" width="400" height="90" class="step"/>
  <circle cx="575" cy="575" r="22" class="badge"/>
  <text x="569" y="581" class="badgeText">3</text>
  <text x="615" y="580" class="label">Preview and iterate</text>
  <text x="615" y="608" class="small">Use the editor, graph, and entity preview surfaces</text>
  <rect x="535" y="645" width="400" height="90" class="step"/>
  <circle cx="575" cy="690" r="22" class="badge"/>
  <text x="569" y="696" class="badgeText">4</text>
  <text x="615" y="695" class="label">Execute the workflow consistently</text>
  <text x="615" y="723" class="small">Same project, same transformation logic, reusable over time</text>

  <rect x="1030" y="200" width="330" height="660" class="panel" fill="url(#reviewGrad)" stroke="#d1aa63"/>
  <text x="1065" y="255" class="section">3. Review Gates</text>
  <rect x="1065" y="315" width="260" height="145" class="step"/>
  <text x="1095" y="365" class="label">Validation</text>
  <text x="1095" y="402" class="body">• structure</text>
  <text x="1095" y="432" class="body">• columns and data</text>
  <rect x="1065" y="500" width="260" height="145" class="step"/>
  <text x="1095" y="550" class="label">Reconciliation</text>
  <text x="1095" y="587" class="body">• sites</text>
  <text x="1095" y="617" class="body">• taxa</text>
  <rect x="1065" y="685" width="260" height="120" class="step"/>
  <text x="1095" y="735" class="label">Human Review</text>
  <text x="1095" y="772" class="body">Check before ingest</text>

  <rect x="1420" y="200" width="300" height="660" class="panel" fill="url(#outputGrad)" stroke="#c499bf"/>
  <text x="1455" y="255" class="section">4. Outputs</text>
  <rect x="1455" y="315" width="230" height="105" class="step"/>
  <text x="1485" y="370" class="label">SEAD-ready data</text>
  <text x="1485" y="400" class="small">Clear structure and relationships</text>
  <rect x="1455" y="455" width="230" height="105" class="step"/>
  <text x="1485" y="510" class="label">Export or dispatch</text>
  <text x="1485" y="540" class="small">Files, databases, ingesters</text>
  <rect x="1455" y="595" width="230" height="170" class="step"/>
  <text x="1485" y="650" class="label">Long-term value</text>
  <text x="1485" y="688" class="body">• reusable workflow</text>
  <text x="1485" y="718" class="body">• traceable decisions</text>
  <text x="1485" y="748" class="body">• easier handover</text>

  <path d="M440 530 C470 530, 475 530, 500 530" class="arrow"/>
  <path d="M970 530 C995 530, 1000 530, 1030 530" class="arrow"/>
  <path d="M1360 530 C1385 530, 1390 530, 1420 530" class="arrow"/>

  <path d="M1195 645 C1195 735, 820 805, 700 735" class="connector"/>
  <text x="930" y="825" class="small">Review feedback loops back into the project until the workflow is ready</text>
</svg>