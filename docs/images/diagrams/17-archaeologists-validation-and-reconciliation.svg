<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcfe"/>
      <stop offset="100%" stop-color="#edf3f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#30516f"/>
    </marker>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #18344d; }
      .subtitle { font: 500 22px Arial, sans-serif; fill: #4a667f; }
      .label { font: 700 24px Arial, sans-serif; fill: #18344d; }
      .body { font: 500 20px Arial, sans-serif; fill: #29465f; }
      .small { font: 500 18px Arial, sans-serif; fill: #49657d; }
      .box { stroke-width: 2; rx: 26; }
      .validation { fill: #eaf4ff; stroke: #7ea9d8; }
      .reconciliation { fill: #eef8ea; stroke: #89bf88; }
      .result { fill: #fff1dd; stroke: #d6a95d; }
      .arrow { stroke: #30516f; stroke-width: 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="100" class="title">Validation and Reconciliation Reduce Uncertainty</text>
  <text x="90" y="142" class="subtitle">Two important review steps before data is sent onward</text>

  <rect x="110" y="230" width="390" height="430" class="box validation"/>
  <text x="145" y="285" class="label">Validation</text>
  <text x="145" y="345" class="body">Checks whether the project</text>
  <text x="145" y="385" class="body">and the data make sense:</text>
  <text x="145" y="445" class="body">• missing columns</text>
  <text x="145" y="485" class="body">• broken references</text>
  <text x="145" y="525" class="body">• structural mistakes</text>
  <text x="145" y="565" class="body">• relationship problems</text>
  <text x="145" y="625" class="small">Catch problems earlier, before execution</text>

  <rect x="605" y="230" width="390" height="430" class="box reconciliation"/>
  <text x="640" y="285" class="label">Reconciliation</text>
  <text x="640" y="345" class="body">Links local values to</text>
  <text x="640" y="385" class="body">authoritative identities:</text>
  <text x="640" y="445" class="body">• sites</text>
  <text x="640" y="485" class="body">• taxa</text>
  <text x="640" y="525" class="body">• vocabularies</text>
  <text x="640" y="565" class="body">• other SEAD-linked values</text>
  <text x="640" y="625" class="small">Review and persist identity decisions</text>

  <rect x="1100" y="230" width="390" height="430" class="box result"/>
  <text x="1135" y="285" class="label">Result</text>
  <text x="1135" y="345" class="body">A workflow that is:</text>
  <text x="1135" y="405" class="body">• more reliable</text>
  <text x="1135" y="445" class="body">• easier to explain</text>
  <text x="1135" y="485" class="body">• easier to review</text>
  <text x="1135" y="525" class="body">• easier to reuse later</text>
  <text x="1135" y="585" class="small">Less hidden work, better traceability</text>

  <path d="M500 445 C550 445, 555 445, 605 445" class="arrow"/>
  <path d="M995 445 C1045 445, 1050 445, 1100 445" class="arrow"/>
</svg>